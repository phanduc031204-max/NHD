<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cậu có đồng ý không? 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #fff0f3;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-circles span {
    position: fixed;
    border-radius: 50%;
    animation: float ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-18px) scale(1.05); }
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 8px 40px rgba(255,105,135,0.13);
    position: relative;
    z-index: 5;
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .bear {
    font-size: 72px;
    display: block;
    line-height: 1;
    margin-bottom: 0.5rem;
    animation: wiggle 2s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%,100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg);  }
  }

  .question {
    font-size: 22px;
    font-weight: 800;
    color: #d63060;
    line-height: 1.35;
    margin: 0.8rem 0 0.4rem;
  }

  .sub {
    font-size: 14px;
    color: #f48fb1;
    margin-bottom: 2rem;
    font-style: italic;
  }

  /* Buttons side by side, fixed positions */
  .btns-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    min-height: 60px;
    position: relative;
  }

  .btn-yes {
    background: #ff4d7d;
    color: #fff;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,77,125,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }

  .btn-yes:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 24px rgba(255,77,125,0.55);
  }

  .btn-no {
    background: #fff;
    color: #999;
    border: 2px solid #e0e0e0;
    padding: 14px 28px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: font-size 0.2s, padding 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    /* will be repositioned by JS when no is clicked */
  }

  .counter-text {
    font-size: 13px;
    color: #ffb3c6;
    margin-top: 1rem;
    min-height: 20px;
    font-style: italic;
  }

  /* SUCCESS */
  .success-card {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 1.5rem;
    max-width: 420px;
    width: 90%;
    position: relative;
    z-index: 5;
  }

  .success-card.show {
    display: flex;
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .meme-box {
    background: #fff;
    border-radius: 20px;
    padding: 1.5rem 1.5rem 1rem;
    box-shadow: 0 8px 40px rgba(255,105,135,0.15);
    text-align: center;
    width: 100%;
  }

  .meme-img {
    width: 100%;
    max-width: 300px;
    border-radius: 14px;
    display: block;
    margin: 0 auto 1rem;
    object-fit: cover;
  }

  .meme-caption {
    font-size: 20px;
    font-weight: 800;
    color: #d63060;
    line-height: 1.4;
  }

  .meme-sub {
    font-size: 14px;
    color: #f48fb1;
    margin-top: 0.3rem;
    font-style: italic;
  }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-circles">
  <span style="width:220px;height:220px;background:#ffe4ec;top:-60px;left:-70px;animation-duration:5s;"></span>
  <span style="width:140px;height:140px;background:#fce4ec;bottom:-40px;right:-40px;animation-duration:4s;animation-delay:1s;"></span>
  <span style="width:90px;height:90px;background:#fff0f5;top:45%;left:3%;animation-duration:6s;animation-delay:0.5s;"></span>
  <span style="width:60px;height:60px;background:#ffd6e7;top:20%;right:6%;animation-duration:5.5s;animation-delay:2s;"></span>
</div>

<!-- Main card -->
<div class="card" id="mainCard">
  <span class="bear">🐻</span>
  <p class="question">Cậu có đồng ý<br>làm người yêu tớ không? 🌸</p>
  <p class="sub">tớ hỏi thật đó nha, đừng có chạy trốn 👀</p>

  <div class="btns-area" id="btnsArea">
    <button class="btn-yes" onclick="handleYes()">Đồng ý 💕</button>
    <button class="btn-no" id="btnNo" onclick="handleNo()">Không đồng ý</button>
  </div>

  <p class="counter-text" id="counterText"></p>
</div>

<!-- Success card -->
<div class="success-card" id="successCard">
  <div class="meme-box">
    <img class="meme-img" id="catMeme" alt="cat meme" />
    <p class="meme-caption">YAY!! Cậu đồng ý rồi!! 🎉</p>
    <p class="meme-sub">Đây là quà cảm ơn~ 🥹💗</p>
  </div>
</div>

  document.getElementById('catMeme').src = 'data:image/png;base64,' + CAT_BASE64;

  let noCount = 0;
  let noMoved = false;
  const messages = [
    "ủa? ấn nhầm rồi đó 👀",
    "thử lại đi… 🥺",
    "cậu chắc chưa? 🙈",
    "tớ biết cậu không muốn vậy đâu 😏",
    "nút đó dính rồi kìa~ 😂",
    "thôi cậu ơi ấn đồng ý đi nào 🥹",
    "tớ chờ mãi nè… 💔",
    "oke tớ sẽ ngồi đây đợi thôi 🫠",
    "nút đó bị lỗi rồi, ấn đồng ý thôi! 😄",
    "cậu đang tra tấn tớ đó biết không 😭",
  ];

  const btnNo = document.getElementById('btnNo');
  const btnsArea = document.getElementById('btnsArea');
  const counterText = document.getElementById('counterText');

  function handleNo() {
    noCount++;

    // Shrink button text/padding
    const newSize = Math.max(10, 15 - noCount * 0.8);
    btnNo.style.fontSize = newSize + 'px';
    btnNo.style.padding = Math.max(4, 14 - noCount * 1.2) + 'px ' + Math.max(10, 28 - noCount * 1.5) + 'px';

    // First click: detach from flex and make it absolutely positioned on screen
    if (!noMoved) {
      noMoved = true;
      const rect = btnNo.getBoundingClientRect();
      btnNo.style.position = 'fixed';
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top = rect.top + 'px';
      btnNo.style.zIndex = '100';
      document.body.appendChild(btnNo);
    }

    // Move to random position avoiding the card
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const btnW = btnNo.offsetWidth || 120;
    const btnH = btnNo.offsetHeight || 44;

    let rx, ry;
    let attempts = 0;
    do {
      rx = Math.random() * (vw - btnW - 20) + 10;
      ry = Math.random() * (vh - btnH - 20) + 10;
      attempts++;
    } while (attempts < 20 && rx > vw/2 - 150 && rx < vw/2 + 150 && ry > vh/2 - 100 && ry < vh/2 + 100);

    btnNo.style.left = rx + 'px';
    btnNo.style.top  = ry + 'px';
    btnNo.style.transition = 'left 0.25s, top 0.25s, font-size 0.2s, padding 0.2s';

    counterText.textContent = messages[Math.min(noCount - 1, messages.length - 1)];
  }

  function handleYes() {
    for (let i = 0; i < 50; i++) {
      setTimeout(spawnConfetti, i * 55);
    }
    document.getElementById('mainCard').style.display = 'none';
    if (noMoved) btnNo.style.display = 'none';
    document.getElementById('successCard').classList.add('show');
  }

  function spawnConfetti() {
    const colors = ['#ff4d7d','#ffb3c6','#ffd6e7','#ff8fab','#c9184a','#fff','#ffec99'];
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = (5 + Math.random() * 90) + '%';
    c.style.top  = '-10px';
    c.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
</script>
